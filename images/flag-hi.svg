<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 48" width="72" height="48" role="img" aria-label="Flag of Hawaii">
  <defs>
    <clipPath id="hiCanton"><rect x="0" y="0" width="40" height="24"/></clipPath>
  </defs>
  <!-- Eight stripes (white, red, blue) representing the main islands -->
  <rect x="0" y="0"  width="72" height="6" fill="#ffffff"/>
  <rect x="0" y="6"  width="72" height="6" fill="#cc0b2a"/>
  <rect x="0" y="12" width="72" height="6" fill="#00247d"/>
  <rect x="0" y="18" width="72" height="6" fill="#ffffff"/>
  <rect x="0" y="24" width="72" height="6" fill="#cc0b2a"/>
  <rect x="0" y="30" width="72" height="6" fill="#00247d"/>
  <rect x="0" y="36" width="72" height="6" fill="#ffffff"/>
  <rect x="0" y="42" width="72" height="6" fill="#cc0b2a"/>
  <!-- Union Jack canton -->
  <g clip-path="url(#hiCanton)">
    <rect x="0" y="0" width="40" height="24" fill="#00247d"/>
    <path d="M0,0 L40,24 M40,0 L0,24" stroke="#ffffff" stroke-width="5"/>
    <path d="M0,0 L40,24 M40,0 L0,24" stroke="#cc0b2a" stroke-width="2"/>
    <path d="M20,0 L20,24 M0,12 L40,12" stroke="#ffffff" stroke-width="8"/>
    <path d="M20,0 L20,24 M0,12 L40,12" stroke="#cc0b2a" stroke-width="4"/>
  </g>
  <rect x="0.5" y="0.5" width="71" height="47" fill="none" stroke="rgba(0,0,0,0.12)"/>
</svg>
